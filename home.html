<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HackChem - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      background: #f5f5f5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 250px;
      background: #fff;
      height: 100vh;
      padding: 20px;
      border-right: 1px solid #eee;
    }
.wallet-container {
  position: relative;
}

.dropdown {
  position: absolute;
  right: 0;
  margin-top: 10px;
  background: white;
  color: black;
  border-radius: 10px;
  display: none;
  min-width: 180px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.dropdown div {
  padding: 10px;
  cursor: pointer;
}

.dropdown div:hover {
  background: #f5f5f5;
}
    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .menu {
      margin-top: 20px;
    }

    .menu-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 5px;
    }

    .menu-item:hover {
      background: #f0f0f0;
    }

    .menu-title {
      font-size: 12px;
      color: #888;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    .sub-item {
      padding: 8px 20px;
      cursor: pointer;
      font-size: 14px;
    }

    .sub-item:hover {
      background: #f5f5f5;
      border-radius: 6px;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search {
      padding: 10px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .wallet {
      background: #111;
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    /* CONTENT */
    .content {
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">HACKCHEM</div>

    <div class="menu">
      <div class="menu-item">🏠 Trang chủ</div>

      <div class="menu-title">HỌC</div>
      <div class="sub-item">📊 Tiến độ học tập</div>
      <div class="sub-item">📚 Khám phá khóa học</div>

      <div class="menu-title">DỰ ÁN</div>
      <div class="sub-item">🧪 Dự án của tôi</div>
      <div class="sub-item">🚀 Khám phá dự án</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
   <div class="topbar">

  <input class="search" placeholder="🔍 Tìm kiếm..." />

  <div class="wallet-container">
    <div class="wallet" id="walletBox" onclick="toggleMenu()"></div>

    <div class="dropdown" id="dropdownMenu">
      <div onclick="openProfile()">👤 Profile</div>
      <div onclick="openBadges()">🏆 Badges</div>
      <div onclick="openNFTs()">🎖 NFTs</div>
      <div onclick="logout()">🚪 Đăng xuất</div>
    </div>
  </div>

</div>

    <!-- CONTENT -->
    <div class="content">
      <h2>👋 Chào mừng đến HackChem</h2>
      <p>Bắt đầu học và khám phá các khóa học ngay!</p>
    </div>

  </div>

 <script>
let walletAddress = "";

// LOAD WALLET
const wallet = localStorage.getItem("wallet");

if (wallet) {
  walletAddress = wallet;

  const short =
    wallet.slice(0,6) + "..." + wallet.slice(-4);

  document.getElementById("walletBox").innerText = "👛 " + short;
} else {
  window.location.href = "index.html";
}

// MENU
function toggleMenu() {
  const menu = document.getElementById("dropdownMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// LOGOUT
function logout() {
  localStorage.removeItem("wallet");
  window.location.href = "index.html";
}

// PROFILE
function openProfile() {
  alert("👤 Wallet: " + walletAddress);
}

// BADGES
function openBadges() {
  alert("🏆 Chưa có badges");
}

// NFT
function openNFTs() {
  alert("🎖 Chưa có NFT");
}
</script>

</body>
</html>
